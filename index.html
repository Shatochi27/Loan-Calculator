<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตารางผ่อนชำระเงินกู้</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Noto+Serif+Thai:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f3ee;
  --bg2:#fdfaf6;
  --bg3:#ede8e1;
  --surface:#ffffff;
  --border:#e4dbd0;
  --border2:#cfc4b5;
  --text:#3a2f26;
  --text2:#7a6a5c;
  --text3:#b0a090;
  --blue:#6b9fd4;
  --blue-bg:#e8f1fb;
  --blue-border:#c0d6f0;
  --green:#5db898;
  --green-bg:#e2f4ec;
  --green-border:#aedecb;
  --rose:#d48a8a;
  --rose-bg:#faeaea;
  --rose-border:#edbbbb;
  --amber:#c8984a;
  --amber-bg:#fdf3e0;
  --amber-border:#ecd4a0;
  --lav:#9d8ec8;
  --lav-bg:#f0edf8;
  --lav-border:#d0c8ec;
  --mint:#6bbcaa;
  --mint-bg:#e4f5f0;
  --mint-border:#aaddd4;
  --r:14px;--rsm:8px;
  --sh:0 2px 16px rgba(80,60,40,.07);
}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;font-size:15px;line-height:1.7;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(#cec5bb 1px,transparent 1px);background-size:26px 26px;opacity:.22;pointer-events:none;z-index:0}
.page{max-width:1200px;margin:0 auto;padding:36px 24px 70px;position:relative;z-index:1}

/* Header */
.header{margin-bottom:30px}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-family:'Noto Serif Thai',serif;font-size:28px;font-weight:600;color:var(--text);letter-spacing:-.3px;line-height:1.3}
.header p{font-size:13px;color:var(--text3);margin-top:4px}
.header-pill{background:var(--lav-bg);border:1px solid var(--lav-border);border-radius:20px;padding:5px 16px;font-size:12px;color:var(--lav);font-weight:500;white-space:nowrap;align-self:flex-start;margin-top:6px}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh)}
.settings-card{padding:26px;margin-bottom:18px}
.card-label{font-size:11px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-label::before{content:'';width:14px;height:2.5px;background:linear-gradient(90deg,var(--lav),var(--blue));border-radius:2px}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:22px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input[type=number]{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rsm);padding:10px 12px;font-size:14px;color:var(--text);font-family:'Sarabun',sans-serif;outline:none;transition:border-color .15s,background .15s}
.field input[type=number]:focus{border-color:var(--lav);background:#fff}
.method-group{display:flex;gap:8px}
.method-btn{flex:1;padding:9px 6px;font-size:13px;border:1.5px solid var(--border2);border-radius:var(--rsm);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .15s;text-align:center}
.method-btn.active{background:var(--lav-bg);border-color:var(--lav);color:var(--lav);font-weight:500}
.method-btn:hover:not(.active){background:#fff;color:var(--text)}
.btn-gen{background:linear-gradient(135deg,#b5aade,#93b4dc);border:none;color:#fff;padding:11px 28px;border-radius:var(--rsm);font-size:14px;font-family:'Sarabun',sans-serif;font-weight:500;cursor:pointer;box-shadow:0 4px 14px rgba(155,142,200,.35);display:inline-flex;align-items:center;gap:8px;transition:opacity .15s,transform .1s}
.btn-gen:hover{opacity:.88}.btn-gen:active{transform:scale(.98)}
.btn-gen svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

/* Metrics */
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin-bottom:18px}
.metric{border-radius:var(--r);padding:18px 20px;border:1px solid transparent;position:relative;overflow:hidden}
.metric::after{content:'';position:absolute;top:-18px;right:-18px;width:60px;height:60px;border-radius:50%;opacity:.12}
.m-lav{background:var(--lav-bg);border-color:var(--lav-border)}.m-lav::after{background:var(--lav)}
.m-blue{background:var(--blue-bg);border-color:var(--blue-border)}.m-blue::after{background:var(--blue)}
.m-green{background:var(--green-bg);border-color:var(--green-border)}.m-green::after{background:var(--green)}
.m-amber{background:var(--amber-bg);border-color:var(--amber-border)}.m-amber::after{background:var(--amber)}
.metric-emoji{font-size:20px;margin-bottom:8px;display:block}
.metric-label{font-size:10.5px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.metric-value{font-size:20px;font-weight:600;letter-spacing:-.5px}
.m-lav .metric-value{color:var(--lav)}
.m-blue .metric-value{color:#4a80b8}
.m-green .metric-value{color:#3a8f6e}
.m-amber .metric-value{color:#a07828}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}



/* Table */
.table-card{overflow:hidden}
.table-hdr{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hint{font-size:11px;color:var(--text3)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:11px 14px;text-align:right;font-size:10.5px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg3)}
thead th:first-child{text-align:center}
thead th.tl{text-align:left}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fef9f4}
tbody td{padding:10px 14px;text-align:right;color:var(--text);font-size:13px;vertical-align:middle}
tbody td:first-child{text-align:center;color:var(--text3);font-size:12px;font-weight:500}
tfoot tr{background:var(--bg3);border-top:1.5px solid var(--border2)}
tfoot td{padding:12px 14px;text-align:right;font-size:13px;font-weight:600}

.rate-inp{width:70px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rsm);padding:5px 8px;font-size:12px;text-align:right;color:var(--text);font-family:'Sarabun',sans-serif;outline:none;transition:border-color .15s}
.rate-inp:focus{border-color:var(--lav);background:#fff}
.bar-wrap{display:flex;height:6px;border-radius:3px;overflow:hidden;min-width:58px;background:var(--bg3)}
.bar-p{background:#7ecaae;height:100%}
.bar-i{background:#88b8e0;height:100%}
.tag-ch{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:500;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);margin-left:5px;vertical-align:middle}
.export-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.btn-export{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:var(--rsm);font-size:13px;font-family:'Sarabun',sans-serif;font-weight:500;cursor:pointer;border:1.5px solid;transition:opacity .15s,transform .1s}
.btn-export:hover{opacity:.82}.btn-export:active{transform:scale(.97)}
.btn-export svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-xlsx{background:var(--green-bg);border-color:var(--green-border);color:#2a7a56}
.btn-pdf{background:var(--rose-bg);border-color:var(--rose-border);color:#a04040}
@media print{
  body::before{display:none}
  .header-pill,.settings-card,.export-bar,.hint,.bar-wrap,.tag-ch,.rate-inp{display:none!important}
  .rate-val{display:inline!important}
  .card{box-shadow:none;border:1px solid #ddd}
  .page{padding:10px}
  table{font-size:11px}
  thead th,tbody td,tfoot td{padding:6px 10px}
}

@media(max-width:640px){
  .header h1{font-size:22px}
  .settings-grid{grid-template-columns:1fr 1fr}
  .metrics-row{grid-template-columns:1fr 1fr}
  .page{padding:18px 14px 50px}
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-top">
      <div>
        <h1>ตารางผ่อนชำระเงินกู้</h1>
        <p>คำนวณค่างวดพร้อมรองรับอัตราดอกเบี้ยที่ต่างกันในแต่ละงวด</p>
      </div>
      <div class="header-pill">Loan Repayment Calculator</div>
    </div>
  </div>

  <div class="card settings-card">
    <p class="card-label">ตั้งค่าเงินกู้</p>
    <div class="settings-grid">
      <div class="field">
        <label>ยอดเงินกู้ (บาท)</label>
        <input type="number" id="principal" value="1000000" min="1000" step="10000">
      </div>
      <div class="field">
        <label>จำนวนงวด (เดือน)</label>
        <input type="number" id="terms" value="12" min="1" max="360">
      </div>
      <div class="field">
        <label>อัตราดอกเบี้ยเริ่มต้น (% ต่อปี)</label>
        <input type="number" id="defaultRate" value="7.00" min="0" max="100" step="0.1">
      </div>
      <div class="field">
        <label>วิธีคำนวณงวด</label>
        <div class="method-group">
          <button class="method-btn active" id="btn-equal" onclick="setMethod('equal')">ผ่อนเท่ากันทุกงวด</button>
          <button class="method-btn" id="btn-fixed" onclick="setMethod('fixed')">เงินต้นเท่ากัน</button>
        </div>
      </div>
    </div>
    <button class="btn-gen" onclick="generate()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0018.49 15"/></svg>
      สร้างตาราง
    </button>
  </div>

  <div class="metrics-row" id="metrics"></div>

  <div class="export-bar">
    <button class="btn-export btn-xlsx" onclick="exportXLSX()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg>
      Export Excel (.xlsx)
    </button>
    <button class="btn-export btn-pdf" onclick="exportPDF()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="11" y2="17"/></svg>
      Export PDF (พิมพ์)
    </button>
  </div>

  <div class="card table-card">
    <div class="table-hdr">
      <p class="card-label" style="margin:0">รายละเอียดรายงวด</p>
      <span class="hint">✏️ แก้ไขอัตราดอกเบี้ย % ต่อปี ในแต่ละงวดได้โดยตรง</span>
    </div>
    <div class="tw">
      <table>
        <thead>
          <tr>
            <th>งวด</th>
            <th class="tl">ยอดเงินกู้คงเหลือ</th>
            <th>ดอกเบี้ย % ต่อปี</th>
            <th>ดอกเบี้ย (บาท)</th>
            <th>เงินต้น (บาท)</th>
            <th>ค่างวด (บาท)</th>
            <th>คงเหลือ (บาท)</th>
            <th>สัดส่วน</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let method='equal';
function setMethod(m){method=m;document.getElementById('btn-equal').className='method-btn'+(m==='equal'?' active':'');document.getElementById('btn-fixed').className='method-btn'+(m==='fixed'?' active':'');}
function fmt(n){return Math.round(n).toLocaleString('th-TH')}
function fmtD(n){return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}
function generate(){
  const P=parseFloat(document.getElementById('principal').value)||1000000;
  const N=parseInt(document.getElementById('terms').value)||12;
  const r0raw=parseFloat(document.getElementById('defaultRate').value);
  const r0=isNaN(r0raw)?7:r0raw;
  const rates=[];
  for(let i=0;i<N;i++) rates.push(r0);
  buildTable(P,N,rates,r0);
}
function calcEq(bal,arr){
  if(!arr.length) return bal;
  const n=arr.length,avgR=arr.reduce((a,b)=>a+b,0)/n/100/12;
  if(avgR===0) return bal/n;
  return bal*avgR*Math.pow(1+avgR,n)/(Math.pow(1+avgR,n)-1);
}
function buildTable(P,N,rates,r0){
  const tb=document.getElementById('tbody'),tf=document.getElementById('tfoot');
  tb.innerHTML='';tf.innerHTML='';
  let bal=P,totI=0,totP=0,totPay=0;
  for(let i=0;i<N;i++){
    const rate=rates[i],rm=rate/100/12,changed=Math.abs(rate-r0)>0.001;
    let pay,interest,prin;
    if(method==='equal'){
      interest=bal*rm;
      if(i===N-1){prin=bal;pay=prin+interest;}
      else{pay=calcEq(bal,rates.slice(i));prin=Math.max(0,pay-interest);}
    } else {
      interest=bal*rm;prin=(i===N-1)?bal:P/N;pay=prin+interest;
    }
    const nb=Math.max(0,bal-prin);
    totI+=interest;totP+=prin;totPay+=pay;
    const pct=pay>0?Math.round(prin/pay*100):0;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${i+1}</td><td style="text-align:left">${fmt(bal)}</td><td style="text-align:center"><input class="rate-inp" type="number" value="${rate.toFixed(2)}" step="0.1" min="0" max="100" onchange="onRC()"><span class="rate-val" style="display:none">${rate.toFixed(2)}</span>${changed?'<span class="tag-ch">แก้ไข</span>':''}</td><td style="color:#4a80b8">${fmtD(interest)}</td><td style="color:#3a8f6e">${fmtD(prin)}</td><td style="font-weight:600">${fmtD(pay)}</td><td style="color:var(--text2)">${fmt(nb)}</td><td><div class="bar-wrap"><div class="bar-p" style="flex:${pct}"></div><div class="bar-i" style="flex:${100-pct}"></div></div></td>`;
    tb.appendChild(tr);bal=nb;
  }
  const tr2=document.createElement('tr');
  tr2.innerHTML=`<td colspan="3" style="text-align:right;color:var(--text2);font-size:11px;letter-spacing:1px;text-transform:uppercase">รวมทั้งสิ้น</td><td style="color:#4a80b8">${fmtD(totI)}</td><td style="color:#3a8f6e">${fmtD(totP)}</td><td>${fmtD(totPay)}</td><td colspan="2"></td>`;
  tf.appendChild(tr2);
  renderMet(P,totI,totPay,N);
}
function renderMet(P,totI,totPay,N){
  document.getElementById('metrics').innerHTML=`
    <div class="metric m-lav"><span class="metric-emoji">🏦</span><div class="metric-label">ยอดเงินกู้</div><div class="metric-value">${fmt(P)}</div><div class="metric-sub">บาท · ${N} งวด</div></div>
    <div class="metric m-blue"><span class="metric-emoji">📊</span><div class="metric-label">ดอกเบี้ยรวม</div><div class="metric-value">${fmtD(totI)}</div><div class="metric-sub">บาท</div></div>
    <div class="metric m-green"><span class="metric-emoji">💳</span><div class="metric-label">ยอดชำระรวม</div><div class="metric-value">${fmtD(totPay)}</div><div class="metric-sub">บาท</div></div>
    <div class="metric m-amber"><span class="metric-emoji">📈</span><div class="metric-label">ดอกเบี้ย / เงินกู้</div><div class="metric-value">${(totI/P*100).toFixed(2)}%</div><div class="metric-sub">ตลอดสัญญา</div></div>`;
}
function onRC(){
  const P=parseFloat(document.getElementById('principal').value)||1000000;
  const N=parseInt(document.getElementById('terms').value)||12;
  const r0=parseFloat(document.getElementById('defaultRate').value);
  const r0safe=isNaN(r0)?7:r0;
  const inp=document.querySelectorAll('input.rate-inp');
  const rates=[];
  for(let i=0;i<N;i++){const v=inp[i]?parseFloat(inp[i].value):NaN;rates.push(isNaN(v)?r0safe:v);}
  buildTable(P,N,rates,r0safe);
}
generate();

function getTableData(){
  const rows=[];
  const headers=['งวด','ยอดเงินกู้คงเหลือ','ดอกเบี้ย % ต่อปี','ดอกเบี้ย (บาท)','เงินต้น (บาท)','ค่างวด (บาท)','คงเหลือ (บาท)'];
  rows.push(headers);
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const cells=tr.querySelectorAll('td');
    const rate=tr.querySelector('.rate-inp')?parseFloat(tr.querySelector('.rate-inp').value):0;
    const row=[
      cells[0].innerText.trim(),
      parseFloat(cells[1].innerText.replace(/,/g,'')),
      rate,
      parseFloat(cells[3].innerText.replace(/,/g,'')),
      parseFloat(cells[4].innerText.replace(/,/g,'')),
      parseFloat(cells[5].innerText.replace(/,/g,'')),
      parseFloat(cells[6].innerText.replace(/,/g,''))
    ];
    rows.push(row);
  });
  const tfCells=document.querySelectorAll('#tfoot td');
  if(tfCells.length>=6){
    rows.push(['รวม','','',
      parseFloat(tfCells[3].innerText.replace(/,/g,'')),
      parseFloat(tfCells[4].innerText.replace(/,/g,'')),
      parseFloat(tfCells[5].innerText.replace(/,/g,'')),
      ''
    ]);
  }
  return rows;
}

function exportXLSX(){
  if(typeof XLSX==='undefined'){alert('กำลังโหลด SheetJS กรุณาลองใหม่อีกครั้ง');return;}
  const P=document.getElementById('principal').value;
  const N=document.getElementById('terms').value;
  const r0=document.getElementById('defaultRate').value;
  const data=getTableData();
  const ws=XLSX.utils.aoa_to_sheet(data);
  // column widths
  ws['!cols']=[{wch:6},{wch:18},{wch:16},{wch:16},{wch:16},{wch:16},{wch:16}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'ตารางผ่อนชำระ',ws);
  // summary sheet
  const sum=[
    ['รายการ','ค่า'],
    ['ยอดเงินกู้ (บาท)',parseFloat(P)||0],
    ['จำนวนงวด',parseInt(N)||0],
    ['อัตราดอกเบี้ยเริ่มต้น (% ต่อปี)',parseFloat(r0)||0],
  ];
  const tfCells=document.querySelectorAll('#tfoot td');
  if(tfCells.length>=6){
    sum.push(['ดอกเบี้ยรวม (บาท)',parseFloat(tfCells[3].innerText.replace(/,/g,''))]);
    sum.push(['ยอดชำระรวม (บาท)',parseFloat(tfCells[5].innerText.replace(/,/g,''))]);
  }
  const ws2=XLSX.utils.aoa_to_sheet(sum);
  ws2['!cols']=[{wch:28},{wch:18}];
  XLSX.utils.book_append_sheet(wb,'สรุป',ws2);
  XLSX.writeFile(wb,'loan-repayment.xlsx');
}

function exportPDF(){
  window.print();
}
</script>
</body>
</html>
